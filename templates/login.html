<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enterprise Login | FinGuard Continuity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
</head>
<body class="bg-light">
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="card login-card p-2 shadow-lg" style="max-width: 400px; width: 100%; border-radius: 12px; border: none;">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <h4 class="fw-bold mb-1" style="color: #0A2540;">FinGuard</h4>
                    <p class="text-muted small text-uppercase" style="letter-spacing: 1px;">Enterprise Continuity Center</p>
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} shadow-sm" role="alert">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label small fw-bold text-muted">AUTHORIZED USERNAME</label>
                        <input type="text" id="username" name="username" class="form-control" required placeholder="e.g. admin.sys" />
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label small fw-bold text-muted">SECURE CREDENTIAL</label>
                        <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••" />
                    </div>
                    <button type="submit" class="btn w-100 py-2 text-white fw-bold" style="background-color: #0A2540; transition: 0.3s;">
                        Access Secure Portal
                    </button>
                </form>

                <p class="text-center mt-4 mb-0 small text-muted">
                    Restricted Access?
                    <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-bold" style="color: #0A2540;">Request Clearance</a>
                </p>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>
</html>
