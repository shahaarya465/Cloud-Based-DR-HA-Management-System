<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Provision Access | FinGuard Continuity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
</head>
<body>
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="card login-card p-2">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <h4 class="fw-bold" style="color: var(--bank-primary);">Provision Account</h4>
                    <p class="text-muted small text-uppercase tracking-wide">Identity & Access Management</p>
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}" role="alert">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label small fw-bold text-muted">OPERATOR ID</label>
                        <input type="text" id="username" name="username" class="form-control" required />
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label small fw-bold text-muted">ASSIGN PASSPHRASE</label>
                        <input type="password" id="password" name="password" class="form-control" required />
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Generate Credentials</button>
                </form>

                <p class="text-center mt-4 mb-0 small text-muted">
                    Existing Operator?
                    <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-bold" style="color: var(--bank-primary);">Authenticate</a>
                </p>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>
</html>
